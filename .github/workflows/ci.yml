name: CI

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main
  release:
    types:
      - published

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      # Prisma Client generation validates that DATABASE_URL exists but does not
      # connect to this placeholder. Runtime readiness is checked separately.
      DATABASE_URL: postgresql://ci:ci@127.0.0.1:5432/restofront_ci
      WORKFLOW_TARGET_WORLD: "@workflow/world-postgres"
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - run: bun install --frozen-lockfile
      - run: bun run test
      - run: bun run lint
      - run: bun run build

  deploy:
    # Ships on a manual dispatch or when a GitHub release is published. Release
    # events check out the release tag, so cutting a release deploys that exact
    # commit. The verify gate and the Production environment protection still apply.
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'release'
    needs: verify
    permissions:
      contents: read
      id-token: write
    uses: ./.github/workflows/deploy-production.yml
