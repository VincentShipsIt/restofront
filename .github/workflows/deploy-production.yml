name: Deploy production

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: restofront-production
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: production
    env:
      AWS_REGION: us-west-1
      ARTIFACT_BUCKET: restofront-production-deploy-948918267147-us-west-1
      INSTANCE_ID: i-00e74422e719396c3
      ROLE_ARN: arn:aws:iam::948918267147:role/restofront-github-production-deploy
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v4

      - name: Build production image
        run: docker build --tag "restofront:${GITHUB_SHA}" .

      - name: Package production image
        run: docker save "restofront:${GITHUB_SHA}" | gzip -1 > restofront.tar.gz

      - uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ env.ROLE_ARN }}

      - name: Upload immutable image artifact
        run: |
          aws s3 cp \
            restofront.tar.gz \
            "s3://${ARTIFACT_BUCKET}/images/${GITHUB_SHA}.tar.gz" \
            --sse AES256 \
            --only-show-errors

      - name: Deploy through Systems Manager
        id: deploy
        run: |
          artifact_uri="s3://${ARTIFACT_BUCKET}/images/${GITHUB_SHA}.tar.gz"
          command="sudo /usr/local/bin/deploy-restofront '${artifact_uri}' 'restofront:${GITHUB_SHA}'"
          parameters="$(jq -cn --arg command "$command" '{commands: [$command]}')"
          command_id="$(
            aws ssm send-command \
              --region "$AWS_REGION" \
              --document-name AWS-RunShellScript \
              --instance-ids "$INSTANCE_ID" \
              --comment "Deploy Restofront ${GITHUB_SHA}" \
              --parameters "$parameters" \
              --query "Command.CommandId" \
              --output text
          )"
          echo "command_id=${command_id}" >>"$GITHUB_OUTPUT"
          for _ in $(seq 1 90); do
            status="$(
              aws ssm get-command-invocation \
                --region "$AWS_REGION" \
                --command-id "$command_id" \
                --instance-id "$INSTANCE_ID" \
                --query Status \
                --output text
            )"
            case "$status" in
              Success) exit 0 ;;
              Cancelled|Cancelling|Failed|TimedOut)
                echo "Deployment command ended with ${status}" >&2
                exit 1
                ;;
            esac
            sleep 10
          done
          echo "Deployment command did not finish within 15 minutes" >&2
          exit 1

      - name: Print deployment result
        if: always() && steps.deploy.outputs.command_id
        run: |
          aws ssm get-command-invocation \
            --region "$AWS_REGION" \
            --command-id "${{ steps.deploy.outputs.command_id }}" \
            --instance-id "$INSTANCE_ID" \
            --query '{Status:Status,Output:StandardOutputContent,Error:StandardErrorContent}'

      - name: Verify production
        run: |
          curl --fail --silent --show-error \
            --retry 12 \
            --retry-all-errors \
            --retry-delay 5 \
            https://api.restofront.com/api/health/ready
